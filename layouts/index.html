{{ define "main" }}
<section class="cover-card">
  <img class="cover-image" src="{{ .Site.Params.cover }}" alt="{{ .Site.Title }} Cover" />
</section>
<section>
  <h2>最新故事</h2>
  <ul class="post-list">
    {{ range .Site.RegularPages.ByDate.Reverse }}
      <li><a href="{{ .RelPermalink }}">{{ .Title }}</a><span class="date">{{ .Date.Format "2006-01-02" }}</span></li>
    {{ else }}<li>还没有故事，先发布第一篇吧。</li>{{ end }}
  </ul>
</section>
{{ end }}
